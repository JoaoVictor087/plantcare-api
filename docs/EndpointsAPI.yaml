openapi: 3.0.0
info:
  title: PlantCare API (Corrigida)
  description: Documentação da API para o aplicativo de monitoramento de plantas PlantCare.
  version: 1.0.0
servers:
  - url: '{baseUrl}'
    variables:
      baseUrl:
        default: http://localhost:8080
        description: Endereço base da API

components:
  # Esquema de Segurança para Bearer Token (JWT)
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # Schemas (DTOs) baseados nos corpos das requisições
  schemas:
    CriarContaDTO:
      type: object
      properties:
        nome:
          type: string
          example: "Seu Nome"
        email:
          type: string
          format: email
          example: "usuario@email.com"
        senha:
          type: string
          format: password
          example: "SuaSenha@123"
    LoginRequestDTO:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "usuario@email.com"
        senha:
          type: string
          format: password
          example: "SuaSenha@123"
    RefreshTokenDTO:
      type: object
      properties:
        refreshToken:
          type: string
          example: "COLE_SEU_REFRESH_TOKEN_AQUI"
    AtualizarUsuarioDTO:
      type: object
      properties:
        nome:
          type: string
          example: "Novo Nome"
    PlantaDTO:
      type: object
      properties:
        nome:
          type: string
          example: "Minha Samambaia"
        especie:
          type: string
          example: "Samambaia"
    PlantaUpdateDTO:
      type: object
      properties:
        nome:
          type: string
          example: "Samambaia Atualizada"
        especie:
          type: string
          example: "Nova Especie"
    CreateSensorDTO:
      type: object
      properties:
        id_planta:
          type: integer
          example: 1
        tipoSensor:
          type: string
          example: "SENSOR_UMIDADE"
    RemoveSensorBody:
      type: string
      description: O ID do sensor a ser removido (enviado como 'raw')
      example: '1'
    LeituraSensorDTO:
      type: object
      properties:
        id_sensor:
          type: integer
          example: 1
        valor:
          type: number
          format: double
          example: 55.5
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        path:
          type: string

# Definição dos Endpoints
paths:
  # ========== AUTH ==========
  /auth/criarConta:
    post:
      tags: [Auth]
      summary: Criar Conta
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CriarContaDTO'
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenDTO'
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden

  # ========== USUARIO ==========
  /usuario/me:
    put:
      tags: [Usuario]
      summary: Atualizar Meu Usuário
      security:
        - bearerAuth: [] # Requisição protegida
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AtualizarUsuarioDTO'
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized

  # ========== PLANTAS ==========
  /plantas:
    post:
      tags: [Plantas]
      summary: Criar Planta
      security:
        - bearerAuth: [] # Requisição protegida
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlantaDTO'
      responses:
        '201':
          description: Created
        '401':
          description: Unauthorized
    get:
      tags: [Plantas]
      summary: Listar Plantas
      security:
        - bearerAuth: [] # Requisição protegida
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized

  /plantas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Plantas]
      summary: Buscar Planta por ID
      security:
        - bearerAuth: [] # Requisição protegida
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      tags: [Plantas]
      summary: Atualizar Planta
      security:
        - bearerAuth: [] # Requisição protegida
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlantaUpdateDTO'
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      tags: [Plantas]
      summary: Deletar Planta
      security:
        - bearerAuth: [] # Requisição protegida
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '404':
          description: Not Found

  # ========== SENSOR ==========
  /sensor/addSensor:
    post:
      tags: [Sensor]
      summary: Adicionar Sensor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSensorDTO'
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request

  /sensor/removeSensor:
    delete:
      tags: [Sensor]
      summary: Remover Sensor
      requestBody:
        description: ID do sensor a ser removido (formato não-padrão)
        content:
          application/json: # O Postman envia 'raw' com 'json'
            schema:
              $ref: '#/components/schemas/RemoveSensorBody'
      responses:
        '200':
          description: OK
        '404':
          description: Not Found

  /sensor/listarSensores:
    get:
      tags: [Sensor]
      summary: Listar Sensores
      responses:
        '200':
          description: OK

  # ========== LEITURA ==========
  /leitura:
    post:
      tags: [Leitura]
      summary: Nova Leitura
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeituraSensorDTO'
      responses:
        '201':
          description: Created
        '404':
          description: Sensor Not Found