version: '3.8'

services:
  # 1. Serviço da sua API Java (plantcare-api)
  app:
    build: .
    container_name: java-api
    command: ["java", "-jar", "app.jar"]
    ports:
      - "8080:8080"
    environment:
      # --- Configs do Banco de Dados ---
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_USERNAME=system
      - SPRING_DATASOURCE_PASSWORD=280103
      - SERVER_SERVLET_CONTEXT_PATH=/api
      # --- Configs do JWT (NOVO) ---
      - jwt.secret=dGVzdGVTZWNyZXRLZXlGb3JEZXZlbG9wbWVudE9ubHkxMjM0NTY3ODkw
      - jwt.access-token-expiration=604800000 # (Mantive seu typo "acess")
    depends_on:
      - oracle-db

  # 2. Serviço do Banco de Dados Oracle
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PWD=280103
      - ORACLE_PDB_LSNR_PORT=1521
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 20m
    volumes:
      - oracle_data:/opt/oracle/oradata

volumes:
  oracle_data: