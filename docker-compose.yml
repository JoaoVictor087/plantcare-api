version: '3.8'

services:
  # 1. Serviço da sua API Java (plantcare-api)
  app:
    build: .
    container_name: java-api
    # Reinicia a API automaticamente se ela falhar (ex: se o banco não estiver pronto)
    restart: on-failure
    command: ["java", "-jar", "app.jar"]
    ports:
      - "8080:8080"
    environment:
      # --- Configs do Banco de Dados (Para o container 'oracle-db') ---
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_USERNAME=system
      - SPRING_DATASOURCE_PASSWORD=280103

      # --- Configs do seu application.properties ---
      - SERVER_SERVLET_CONTEXT_PATH=/api
      - spring.jpa.hibernate.ddl-auto=update
      - spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
      - spring.jpa.show-sql=true
      - logging.level.org.springframework.security=DEBUG

      # --- Configs do JWT (Corrigi meu typo anterior) ---
      - jwt.secret=dGVzdGVTZWNyZXRLZXlGb3JEZXZlbG9wbWVudE9ubHkxMjM0NTY3ODkw
      - jwt.access-token-expiration=604800000
    depends_on:
      - oracle-db

  # 2. Serviço do Banco de Dados Oracle
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-db
    ports:
      # Expõe a porta do banco para você acessar de fora, se precisar
      - "1521:1521"
    environment:
      # Define a senha do usuário 'system' para a mesma do seu properties
      - ORACLE_PWD=280103
      - ORACLE_PDB_LSNR_PORT=1521
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      # Damos 20 minutos de tolerância para o banco iniciar
      start_period: 20m
    volumes:
      # Garante que os dados do banco sejam salvos permanentemente
      - oracle_data:/opt/oracle/oradata

volumes:
  oracle_data: